<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カスタム数独</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-fixed: #e0e0e0;
            --border-thick: 3px solid #333;
            --border-thin: 1px solid #ccc;
            --selected: #bbdefb;
            --highlight-line: #f1f7ff;
            --highlight-same: #fff59d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f8f9fa;
            margin: 0;
            padding: 20px;
        }

        /* レベル選択 */
        .settings { margin-bottom: 20px; }
        select { padding: 8px; font-size: 16px; border-radius: 5px; }

        /* グリッド */
        #sudoku-grid {
            display: grid;
            grid-template-columns: repeat(9, 40px);
            grid-template-rows: repeat(9, 40px);
            border: var(--border-thick);
            background-color: white;
            user-select: none;
        }

        .cell {
            width: 40px;
            height: 40px;
            box-sizing: border-box;
            border: var(--border-thin);
            text-align: center;
            line-height: 40px;
            font-size: 18px;
            cursor: pointer;
        }

        /* 3x3区切り */
        #sudoku-grid .cell:nth-child(3n) { border-right: var(--border-thick); }
        #sudoku-grid .cell:nth-child(9n) { border-right: var(--border-thin); }
        #sudoku-grid .cell:nth-child(n+19):nth-child(-n+27),
        #sudoku-grid .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: var(--border-thick); }

        .fixed { background-color: var(--bg-fixed); font-weight: bold; }
        .highlight-line { background-color: var(--highlight-line); }
        .same-number { background-color: var(--highlight-same); }
        .selected { background-color: var(--selected) !important; }
        .user-val { color: var(--primary-color); }

        /* 数字パレット */
        .palette {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 20px;
            width: 100%;
            max-width: 360px;
        }

        .p-btn {
            padding: 15px 0;
            font-size: 20px;
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
        }

        .p-btn:active { background-color: #ddd; }
        .p-btn.clear { grid-column: span 1; color: red; }

        /* コントロール */
        .controls { margin-top: 20px; display: flex; gap: 10px; }
        button.main-btn {
            padding: 10px 20px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #message { margin-top: 15px; font-weight: bold; height: 1.2em; }

        /* レスポンシブ対応 (PC) */
        @media (min-width: 500px) {
            #sudoku-grid { grid-template-columns: repeat(9, 50px); grid-template-rows: repeat(9, 50px); }
            .cell { width: 50px; height: 50px; line-height: 50px; font-size: 22px; }
        }
    </style>
</head>
<body>

    <h1>数独</h1>

    <div class="settings">
        レベル: 
        <select id="difficulty">
            <option value="6">レベル1（空白6マス）</option>
            <option value="8">レベル2（空白8マス）</option>
            <option value="10">レベル3（空白10マス）</option>
            <option value="12">レベル4（空白12マス）</option>
            <option value="14">レベル5（空白14マス）</option>
            <option value="16">レベル6（空白16マス）</option>
            <option value="18">レベル7（空白18マス）</option>
            <option value="20">レベル8（空白20マス）</option>
            <option value="23">レベル9（空白23マス）</option>
            <option value="26">レベル10（空白26マス）</option>
            <option value="29">レベル11（空白29マス）</option>
            <option value="32">レベル12（空白32マス）</option>
            <option value="36">レベル13（空白36マス）</option>
            <option value="40">レベル14（空白40マス）</option>
            <option value="44">レベル15（空白44マス）</option>
            <option value="48">レベル16（空白48マス）</option>
            <option value="52">レベル17（空白52マス）</option>
            <option value="56">レベル18（空白56マス）</option>
            <option value="60">レベル19（空白60マス）</option>
            <option value="64">レベル20（空白64マス）</option>
        </select>
    </div>

    <div id="sudoku-grid"></div>

    <div class="palette">
        <div class="p-btn" onclick="inputValue(1)">1</div>
        <div class="p-btn" onclick="inputValue(2)">2</div>
        <div class="p-btn" onclick="inputValue(3)">3</div>
        <div class="p-btn" onclick="inputValue(4)">4</div>
        <div class="p-btn" onclick="inputValue(5)">5</div>
        <div class="p-btn" onclick="inputValue(6)">6</div>
        <div class="p-btn" onclick="inputValue(7)">7</div>
        <div class="p-btn" onclick="inputValue(8)">8</div>
        <div class="p-btn" onclick="inputValue(9)">9</div>
        <div class="p-btn clear" onclick="inputValue(null)">消</div>
    </div>

    <div class="controls">
        <button class="main-btn" onclick="newGame()">新ゲーム</button>
        <button class="main-btn" onclick="checkAnswer()">答え合わせ</button>
    </div>

    <p id="message"></p>

    <script>
        const gridContainer = document.getElementById('sudoku-grid');
        const difficultySelect = document.getElementById('difficulty');
        const message = document.getElementById('message');
        
        let selectedCell = null;
        let currentSolution = [];
        let currentBoard = [];
        let fixedCells = [];

        // ベースとなる正解盤面（これをもとに問題を生成）
        const baseSolution = [
            5,3,4,6,7,8,9,1,2, 6,7,2,1,9,5,3,4,8, 1,9,8,3,4,2,5,6,7,
            8,5,9,7,6,1,4,2,3, 4,2,6,8,5,3,7,9,1, 7,1,3,9,2,4,8,5,6,
            9,6,1,5,3,7,2,8,4, 2,8,7,4,1,9,6,3,5, 3,4,5,2,8,6,1,7,9
        ];

        function newGame() {
            // 解の生成（現在は固定の完成盤を使用）
            currentSolution = [...baseSolution];
            selectedCell = null;
            generateBoard();
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function generateBoard() {
            const blankCount = parseInt(difficultySelect.value, 10);
            const blankIndices = shuffle([...Array(81).keys()]).slice(0, blankCount);
            const blankSet = new Set(blankIndices);

            currentBoard = Array(81).fill(0);
            fixedCells = Array(81).fill(false);

            currentSolution.forEach((value, i) => {
                if (!blankSet.has(i)) {
                    currentBoard[i] = value;
                    fixedCells[i] = true;
                }
            });

            renderGrid();
        }

        function renderGrid() {
            gridContainer.innerHTML = '';
            message.textContent = '';
            message.style.color = '';

            currentBoard.forEach((val, i) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.onclick = () => selectCell(cell, i);

                if (val !== 0) {
                    cell.textContent = val;
                }
                if (fixedCells[i]) {
                    cell.classList.add('fixed');
                } else if (val !== 0) {
                    cell.classList.add('user-val');
                }

                gridContainer.appendChild(cell);
            });
        }

        function selectCell(dom, index) {
            selectedCell = { dom, index };
            message.textContent = '';
            message.style.color = '';
            applyHighlights();
        }

        function clearHighlights() {
            document.querySelectorAll('.cell').forEach(cell => {
                cell.classList.remove('selected', 'highlight-line', 'same-number');
            });
        }

        function applyHighlights() {
            clearHighlights();
            if (!selectedCell) return;

            const selectedIndex = selectedCell.index;
            const selectedRow = Math.floor(selectedIndex / 9);
            const selectedCol = selectedIndex % 9;
            const selectedValue = currentBoard[selectedIndex];

            document.querySelectorAll('.cell').forEach((cell, i) => {
                const row = Math.floor(i / 9);
                const col = i % 9;

                if (row === selectedRow || col === selectedCol) {
                    cell.classList.add('highlight-line');
                }
                if (selectedValue !== 0 && currentBoard[i] === selectedValue) {
                    cell.classList.add('same-number');
                }
            });

            selectedCell.dom.classList.add('selected');
        }

        function inputValue(num) {
            if (!selectedCell) {
                message.style.color = "orange";
                message.textContent = "マスを選択してください";
                return;
            }

            if (fixedCells[selectedCell.index]) {
                message.style.color = "orange";
                message.textContent = "固定マスは変更できません";
                return;
            }

            if (num === null) {
                selectedCell.dom.textContent = '';
                selectedCell.dom.classList.remove('user-val');
                currentBoard[selectedCell.index] = 0;
            } else {
                selectedCell.dom.textContent = num;
                selectedCell.dom.classList.add('user-val');
                currentBoard[selectedCell.index] = num;
            }

            message.textContent = '';
            message.style.color = '';
            applyHighlights();
        }

        function checkAnswer() {
            const isComplete = currentBoard.every(v => v !== 0);
            if (!isComplete) {
                message.style.color = "orange";
                message.textContent = "まだ空欄があります！";
                return;
            }

            const isCorrect = currentBoard.every((v, i) => v === currentSolution[i]);
            if (isCorrect) {
                message.style.color = "green";
                message.textContent = "正解です！素晴らしい！";
            } else {
                message.style.color = "red";
                message.textContent = "間違いがあるようです。";
            }
        }

        // 難易度を変更したら、そのレベルで新しい問題を作る
        difficultySelect.addEventListener('change', newGame);

        // キーボード入力にも対応
        document.addEventListener('keydown', (e) => {
            if (e.key >= 1 && e.key <= 9) inputValue(parseInt(e.key, 10));
            if (e.key === 'Backspace' || e.key === 'Delete') inputValue(null);
        });

        newGame();
    </script>
</body>
</html>
